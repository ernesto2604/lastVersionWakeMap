name: wake_map
description: "WakeMap - Location-based alarm app with Commuter and Traveller modes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  provider: ^6.1.4
  http: ^1.3.0
  pointer_interceptor: ^0.10.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
